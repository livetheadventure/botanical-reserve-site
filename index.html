<body>

<h1 class="visually-hidden">The Botanical Reserve – DIY Flower Kits Delivered Weekly in Vancouver</h1>

<p class="visually-hidden">
The Botanical Reserve is a Vancouver flower business offering fresh flower kits delivered weekly.
Customers receive curated stems to arrange their own bouquet at home.
</p>

<div class="bg" aria-hidden="true"></div>

<div class="top-banner">
  <span class="line1">Flower Kits. Delivered Weekly.</span>
  <span class="separator">•</span>
  <span class="line2">Launching in Vancouver</span>
</div>

<img src="frontpage.png"
class="desktop-img"
alt="The Botanical Reserve — Fresh Flower Kits. Delivered Weekly. Designed by You."
loading="eager"
fetchpriority="high">

<img src="frontpage-mobile.png"
class="mobile-img"
alt="The Botanical Reserve — Fresh Flower Kits. Delivered Weekly. Designed by You."
loading="eager"
fetchpriority="high">

<div class="form-wrap">
  <form id="signup-form" class="email-form" aria-label="Join limited release form">
    <input type="text" name="_gotcha" style="display:none">

    <label for="email" class="visually-hidden">Email address</label>
    <input
      id="email"
      type="email"
      name="email"
      placeholder="Enter your email"
      aria-label="Email address"
      autocomplete="email"
      required>

    <label for="neighborhood" class="visually-hidden">Select your neighbourhood</label>
    <select id="neighborhood" name="neighborhood" aria-label="Select your neighbourhood">
      <option value="">Select your neighbourhood</option>
      <option>South Granville</option>
      <option>Kerrisdale</option>
      <option>Dunbar</option>
      <option>Point Grey</option>
      <option>UBC</option>
      <option>Kitsilano</option>
      <option>West End</option>
      <option>Downtown</option>
      <option>Yaletown</option>
      <option>Mount Pleasant</option>
      <option>Commercial Drive</option>
      <option>East Vancouver</option>
    </select>

    <button type="submit">Join Limited Release</button>
  </form>
</div>

<script>
const form = document.getElementById("signup-form");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const submitButton = form.querySelector('button[type="submit"]');
  const originalButtonText = submitButton.textContent;

  submitButton.disabled = true;
  submitButton.textContent = "Joining...";

  const data = new FormData(form);

  try {
    const response = await fetch("https://formspree.io/f/xojkpqqv", {
      method: "POST",
      body: data,
      headers: {
        "Accept": "application/json"
      }
    });

    if (response.ok) {
      window.location.href = "https://botanicalreserve.ca/thanks.html";
    } else {
      alert("Something went wrong. Please try again.");
      submitButton.disabled = false;
      submitButton.textContent = originalButtonText;
    }
  } catch (error) {
    alert("Network error. Please try again.");
    submitButton.disabled = false;
    submitButton.textContent = originalButtonText;
  }
});
</script>
