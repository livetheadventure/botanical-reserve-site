<!DOCTYPE html>
<html lang="en">
<head>

<title>The Botanical Reserve | DIY Flower Delivery Vancouver</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description" content="DIY flower delivery in Vancouver. Fresh flowers delivered for you to design your own bouquet at home. The Botanical Reserve.">

<meta name="robots" content="index, follow">

<meta property="og:title" content="The Botanical Reserve">
<meta property="og:description" content="Fresh Flowers. Designed by You.">
<meta property="og:image" content="frontpage.png">
<meta property="og:url" content="https://botanicalreserve.ca">

<link rel="canonical" href="https://botanicalreserve.ca">

<style>
html, body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* blurred background */
.bg{
position:fixed;
inset:0;
background-image:url("frontpage.png");
background-size:cover;
background-position:center;
filter:blur(18px);
transform:scale(1.1);
}

/* desktop image */
.desktop-img{
position:relative;
z-index:2;
max-width:100%;
max-height:100vh;
width:auto;
height:auto;
display:block;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

/* mobile image */
.mobile-img{
display:none;
}

/* inline email form */
.email-form{
position:absolute;
z-index:3;
bottom:42px;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:10px;
}

.email-form input{
width:220px;
padding:12px 16px;
border:none;
border-radius:999px;
font-size:14px;
font-family:Georgia, serif;
color:#2f2f2f;
background:rgba(255,255,255,0.9);
box-shadow:0 6px 24px rgba(0,0,0,0.12);
outline:none;
backdrop-filter:blur(10px);
}

.email-form input::placeholder{
color:#666;
}

.email-form button{
background:rgba(255,255,255,0.9);
color:#2f2f2f;
border:none;
padding:12px 22px;
font-size:14px;
letter-spacing:0.02em;
border-radius:999px;
box-shadow:0 6px 24px rgba(0,0,0,0.12);
font-family:Georgia, serif;
cursor:pointer;
backdrop-filter:blur(10px);
}

.email-form button:hover{
background:rgba(255,255,255,0.97);
}

/* mobile */
@media (max-width:768px){

.bg{
background-image:url("frontpage-mobile.png");
transform:scale(1.15);
}

.desktop-img{
display:none;
}

.mobile-img{
display:block;
position:relative;
z-index:2;
max-width:92vw;
max-height:92vh;
width:auto;
height:auto;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

.email-form{
bottom:28px;
flex-direction:column;
gap:8px;
}

.email-form input{
width:190px;
font-size:13px;
padding:10px 14px;
}

.email-form button{
font-size:13px;
padding:10px 18px;
width:190px;
}

}
</style>

</head>

<body>

<h1 style="position:absolute;left:-9999px;">
The Botanical Reserve – DIY Flower Delivery Vancouver
</h1>

<div class="bg"></div>

<img src="frontpage.png"
class="desktop-img"
alt="The Botanical Reserve — Fresh Flowers. Designed by You.">

<img src="frontpage-mobile.png"
class="mobile-img"
alt="The Botanical Reserve — Fresh Flowers. Designed by You.">

<form action="https://formspree.io/f/xojkpqqv" method="POST" class="email-form">
  <input type="email" name="email" placeholder="Enter your email" required>
  <button type="submit">Get Early Access</button>
</form>

</body>
</html>
