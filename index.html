<!DOCTYPE html>
<html lang="en">
<head>

<title>The Botanical Reserve | DIY Flower Kits Vancouver</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="The Botanical Reserve offers fresh flower kits delivered weekly in Vancouver. Design your own bouquet at home with curated stems and simple, beautiful presentation.">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#f7f3ee">

<link rel="canonical" href="https://botanicalreserve.ca">

<meta property="og:title" content="The Botanical Reserve">
<meta property="og:description" content="Flower Kits, Delivered Weekly. Designed by You.">
<meta property="og:image" content="https://botanicalreserve.ca/frontpage.png">

<meta name="twitter:card" content="summary_large_image">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  font-family: 'Playfair Display', serif;
  background: #f7f3ee;
  overflow-x: hidden;
}

/* background */
.bg {
  display: none;
}

/* top banner */
.top-banner {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  padding: 10px 20px;
  border-radius: 999px;
  background: rgba(255,255,255,0.16);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  color: #3f3a3a;
  font-size: 15px;
  white-space: nowrap;
}

/* hero text */
.hero-text {
  position: absolute;
  top: 28%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 3;
  text-align: center;
  color: #3f3a3a;
  max-width: 900px;
  width: 90%;
}

.hero-text .brand {
  font-size: 42px;
  letter-spacing: 0.08em;
  font-weight: 500;
  margin-bottom: 18px;
  line-height: 1.1;
  white-space: nowrap;
}

.hero-text .sub {
  font-size: 20px;
  margin-bottom: 10px;
  line-height: 1.3;
}

.hero-text .tag {
  font-size: 18px;
  font-style: italic;
  opacity: 0.85;
  line-height: 1.3;
}

.hero-text .brand,
.hero-text .sub,
.hero-text .tag {
  text-shadow: 0 2px 10px rgba(255,255,255,0.35);
}

/* image */
.desktop-img {
  position: fixed;
  inset: 0;
  z-index: 1;
  width: 100%;
  height: 100vh;
  object-fit: cover;
  object-position: center center;
  box-shadow: none;
  display: block;
}

/* desktop form */
.form-wrap {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 4;
}

.email-form {
  display: flex;
  gap: 10px;
  padding: 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.14);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

.email-form input:focus,
.email-form select:focus {
  outline: none;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.10);
}

.email-form button {
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.email-form button:active {
  transform: scale(0.97);
}

.email-form input,
.email-form select,
.email-form button {
  height: 44px;
  border-radius: 999px;
  border: none;
  font-family: 'Playfair Display', serif;
  padding: 0 14px;
  font-size: 15px;
}

.email-form input,
.email-form select {
  background: white;
  min-width: 210px;
  color: #000;
}

.email-form button {
  background: white;
  cursor: pointer;
  white-space: nowrap;
  min-width: 190px;
  padding: 0 20px;
  color: #000;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* hide mobile-only elements on desktop */
.quick-email,
.full-form-section {
  display: none;
}

/* MOBILE ONLY */
@media (max-width: 768px) {

  body {
    display: block;
    overflow-y: hidden;
  }

  .bg {
    display: none;
  }

  .top-banner {
    top: calc(env(safe-area-inset-top, 0px) + 14px);
    font-size: 14px;
    padding: 11px 22px;
  }

  .hero-text {
    top: 18%;
    left: 50%;
    transform: translate(-50%, 0);
    width: 88%;
  }

  .hero-text .brand {
    white-space: nowrap;
    line-height: 1.1;
    padding: 0 10px;
    font-size: clamp(20px, 6vw, 29px);
  }

  .hero-text .sub {
    font-size: 15px;
  }

  .hero-text .tag {
    font-size: 13px;
  }

  .desktop-img {
    position: relative;
    inset: auto;
    width: 100%;
    height: 100svh;
    height: 100dvh;
    object-fit: cover;
    object-position: center 44%;
    box-shadow: none;
  }

  .form-wrap {
    display: none;
  }

  .quick-email {
    display: none;
  }

  .full-form-section {
    display: block;
    position: absolute;
    left: 50%;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 2px);
    transform: translateX(-50%) scale(0.86);
    transform-origin: bottom center;
    width: 80%;
    max-width: 300px;
    z-index: 4;
  }

  .full-form-section .email-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: rgba(255,255,255,0.14);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 8px;
    border-radius: 18px;
  }

  .full-form-section input,
  .full-form-section select,
  .full-form-section button {
    height: 42px;
    font-size: 13px;
    width: 100%;
    min-width: 0;
  }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="top-banner">
  Launching in Vancouver
</div>

<div class="hero-text">
  <div class="brand">The Botanical Reserve</div>
  <div class="sub">Flower Kits, Delivered Weekly</div>

</div>

<img src="frontpage.png" class="desktop-img" alt="The Botanical Reserve">

<div class="form-wrap">
  <form class="email-form" action="https://formspree.io/f/xojkpqqv" method="POST">
    <input type="email" name="email" placeholder="Enter your email" required>
    <select name="neighbourhood" required>
      <option value="">Select your neighbourhood</option>
      <option>Dunbar</option>
      <option>Kerrisdale</option>
      <option>South Granville</option>
      <option>Shaughnessy</option>
      <option>Point Grey</option>
      <option>West Point Grey</option>
      <option>Arbutus Ridge</option>
      <option>South Cambie</option>
      <option>Oakridge</option>
      <option>Kitsilano</option>
      <option>Fairview</option>
      <option>West End</option>
      <option>Downtown</option>
      <option>Yaletown</option>
      <option>Olympic Village</option>
      <option>False Creek</option>
      <option>Mount Pleasant</option>
      <option>Main Street</option>
      <option>Riley Park</option>
      <option>Cambie Village</option>
      <option>Marpole</option>
      <option>Sunset</option>
      <option>Killarney</option>
      <option>Renfrew-Collingwood</option>
      <option>Hastings-Sunrise</option>
      <option>Grandview-Woodland</option>
      <option>Cedar Cottage</option>
      <option>Kensington-Cedar Cottage</option>
      <option>Victoria-Fraserview</option>
      <option>Strathcona</option>
      <option>Chinatown</option>
    </select>
    <button type="submit">Join Limited Release</button>
  </form>
</div>

<div id="fullForm" class="full-form-section">
  <form class="email-form" action="https://formspree.io/f/xojkpqqv" method="POST">
    <input type="email" name="email" placeholder="Enter your email" required>
    <select name="neighbourhood" required>
      <option value="">Select your neighbourhood</option>
      <option>Dunbar</option>
      <option>Kerrisdale</option>
      <option>South Granville</option>
      <option>Shaughnessy</option>
      <option>Point Grey</option>
      <option>West Point Grey</option>
      <option>Arbutus Ridge</option>
      <option>South Cambie</option>
      <option>Oakridge</option>
      <option>Kitsilano</option>
      <option>Fairview</option>
      <option>West End</option>
      <option>Downtown</option>
      <option>Yaletown</option>
      <option>Olympic Village</option>
      <option>False Creek</option>
      <option>Mount Pleasant</option>
      <option>Main Street</option>
      <option>Riley Park</option>
      <option>Cambie Village</option>
      <option>Marpole</option>
      <option>Sunset</option>
      <option>Killarney</option>
      <option>Renfrew-Collingwood</option>
      <option>Hastings-Sunrise</option>
      <option>Grandview-Woodland</option>
      <option>Cedar Cottage</option>
      <option>Kensington-Cedar Cottage</option>
      <option>Victoria-Fraserview</option>
      <option>Strathcona</option>
      <option>Chinatown</option>
    </select>
    <button type="submit">Join Early Access</button>
  </form>
</div>

<script>
document.querySelectorAll('.email-form').forEach(form => {
  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const button = form.querySelector('button');
    const originalText = button.textContent;
    button.textContent = 'Joining...';
    button.disabled = true;

    const formData = new FormData(form);

    try {
      const response = await fetch('https://formspree.io/f/xojkpqqv', {
        method: 'POST',
        body: formData,
        headers: {
          'Accept': 'application/json'
        }
      });

      if (response.ok) {
        window.location.href = 'thanks.html';
      } else {
        button.textContent = originalText;
        button.disabled = false;
        alert('Something went wrong. Please try again.');
      }
    } catch (error) {
      button.textContent = originalText;
      button.disabled = false;
      alert('Network error. Please try again.');
    }
  });
});
</script>

</body>
</html>
