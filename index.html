<!DOCTYPE html>
<html lang="en">
<head>

<title>The Botanical Reserve | DIY Flower Delivery Vancouver</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description" content="DIY flower delivery in Vancouver. Fresh flowers delivered for you to design your own bouquet at home. The Botanical Reserve.">

<meta name="robots" content="index, follow">

<meta property="og:title" content="The Botanical Reserve">
<meta property="og:description" content="Fresh Flower Kits Delivered Weekly. Designed by You.">
<meta property="og:image" content="frontpage.png">
<meta property="og:url" content="https://botanicalreserve.ca">

<link rel="canonical" href="https://botanicalreserve.ca">

<style>
html, body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
position:relative;
font-family:Georgia, serif;
}

/* blurred background */
.bg{
position:fixed;
inset:0;
z-index:0;
background-image:url("frontpage.png");
background-size:cover;
background-position:center;
filter:blur(18px);
transform:scale(1.1);
pointer-events:none;
}

/* desktop image */
.desktop-img{
position:relative;
z-index:2;
max-width:100%;
max-height:100vh;
width:auto;
height:auto;
display:block;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
pointer-events:none;
}

/* mobile image */
.mobile-img{
display:none;
pointer-events:none;
}

/* new text overlay */
.headline{
position:fixed;
left:50%;
top:67%;
transform:translateX(-50%);
z-index:3;
text-align:center;
width:min(90vw, 720px);
padding:0 16px;
box-sizing:border-box;
}

.headline-main{
margin:0 0 8px 0;
font-size:24px;
line-height:1.35;
font-weight:500;
color:rgba(38,38,38,0.96);
text-shadow:0 1px 10px rgba(255,255,255,0.55);
}

.headline-sub{
margin:0;
font-size:14px;
line-height:1.4;
color:rgba(45,45,45,0.92);
text-shadow:0 1px 8px rgba(255,255,255,0.60);
}

/* bottom bar wrap */
.form-wrap{
position:fixed;
left:50%;
bottom:20px;
transform:translateX(-50%);
z-index:4;
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
}

/* subtle helper text */
.form-note{
margin:0;
font-size:12px;
color:rgba(55,55,55,0.90);
text-align:center;
letter-spacing:0.01em;
text-shadow:0 1px 6px rgba(255,255,255,0.45);
}

/* form bar */
.email-form{
display:flex;
align-items:center;
gap:8px;
margin:0;
padding:8px 10px;
border-radius:999px;
background:rgba(255,255,255,0.14);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);
box-shadow:0 10px 30px rgba(0,0,0,0.10);
}

.email-form input{
width:185px;
padding:11px 14px;
border:none;
border-radius:999px;
font-size:13px;
font-family:Georgia, serif;
color:#2f2f2f;
background:rgba(255,255,255,0.92);
box-shadow:0 4px 14px rgba(0,0,0,0.08);
outline:none;
box-sizing:border-box;
}

.email-form input[name="neighborhood"]{
width:175px;
}

.email-form input::placeholder{
color:#666;
}

.email-form button{
padding:11px 16px;
border:none;
border-radius:999px;
font-size:13px;
font-family:Georgia, serif;
color:#2f2f2f;
background:rgba(255,255,255,0.96);
box-shadow:0 4px 14px rgba(0,0,0,0.08);
cursor:pointer;
white-space:nowrap;
transition:background 0.2s ease, transform 0.2s ease;
}

.email-form button:hover{
background:white;
transform:translateY(-1px);
}

/* mobile */
@media (max-width:768px){

.bg{
background-image:url("frontpage-mobile.png");
transform:scale(1.15);
}

.desktop-img{
display:none;
}

.mobile-img{
display:block;
position:relative;
z-index:2;
max-width:92vw;
max-height:92vh;
width:auto;
height:auto;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

.headline{
top:63%;
width:min(92vw, 420px);
padding:0 14px;
}

.headline-main{
font-size:17px;
line-height:1.35;
margin-bottom:6px;
}

.headline-sub{
font-size:12px;
line-height:1.35;
}

.form-wrap{
bottom:14px;
gap:6px;
}

.form-note{
font-size:11px;
max-width:220px;
}

.email-form{
flex-direction:column;
gap:6px;
padding:8px;
border-radius:20px;
background:rgba(255,255,255,0.10);
}

.email-form input{
width:210px;
font-size:13px;
padding:10px 12px;
}

.email-form input[name="neighborhood"]{
width:210px;
}

.email-form button{
width:210px;
font-size:13px;
padding:10px 12px;
}

}
</style>
</head>

<body>

<h1 style="position:absolute;left:-9999px;">
The Botanical Reserve – DIY Flower Delivery Vancouver
</h1>

<div class="bg"></div>

<img src="frontpage.png"
class="desktop-img"
alt="The Botanical Reserve — Fresh Flower Kits Delivered Weekly. Designed by You.">

<img src="frontpage-mobile.png"
class="mobile-img"
alt="The Botanical Reserve — Fresh Flower Kits Delivered Weekly. Designed by You.">

<div class="headline">
  <p class="headline-main">Fresh Flower Kits Delivered Weekly. Designed by You.</p>
  <p class="headline-sub">Launching soon in limited Vancouver neighbourhoods</p>
</div>

<div class="form-wrap">
  <p class="form-note">Join the waitlist for early access</p>

  <form action="https://formspree.io/f/xojkpqqv" method="POST" class="email-form">
    <input type="email" name="email" placeholder="Enter your email" aria-label="Email address" autocomplete="email" required>
    <input type="text" name="neighborhood" placeholder="Neighbourhood (optional)" aria-label="Neighbourhood" autocomplete="address-level2">
    <button type="submit">Get Early Access</button>
  </form>
</div>

</body>
</html>
