<style>
html, body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
position:relative;
font-family:Georgia, serif;
}

/* blurred background */
.bg{
position:fixed;
inset:0;
background-image:url("frontpage.png");
background-size:cover;
background-position:center;
filter:blur(18px);
transform:scale(1.1);
}

/* desktop image */
.desktop-img{
position:relative;
z-index:2;
max-width:100%;
max-height:100vh;
width:auto;
height:auto;
display:block;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

/* mobile image */
.mobile-img{
display:none;
}

/* bottom bar wrap */
.form-wrap{
position:fixed;
left:50%;
bottom:16px; /* lowered slightly */
transform:translateX(-50%);
z-index:4;
display:flex;
align-items:center;
}

/* form bar */
.email-form{
display:flex;
align-items:center;
gap:6px; /* tighter spacing */
margin:0;
padding:6px 8px; /* slimmer */
border-radius:999px;
background:rgba(255,255,255,0.12); /* lighter */
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
box-shadow:0 8px 24px rgba(0,0,0,0.08); /* softer */
}

/* inputs */
.email-form input{
width:170px;
padding:10px 14px;
border:none;
border-radius:999px;
font-size:13px;
font-family:Georgia, serif;
color:#2f2f2f;
background:rgba(255,255,255,0.92);
box-shadow:0 3px 10px rgba(0,0,0,0.06);
outline:none;
}

.email-form input[name="neighborhood"]{
width:160px;
}

/* button */
.email-form button{
padding:10px 14px;
border:none;
border-radius:999px;
font-size:13px;
font-family:Georgia, serif;
background:rgba(255,255,255,0.95);
box-shadow:0 3px 10px rgba(0,0,0,0.06);
cursor:pointer;
white-space:nowrap;
transition:all 0.18s ease;
}

.email-form button:hover{
background:white;
transform:translateY(-1px);
box-shadow:0 6px 18px rgba(0,0,0,0.10);
}

/* mobile */
@media (max-width:768px){

.bg{
background-image:url("frontpage-mobile.png");
transform:scale(1.15);
}

.desktop-img{
display:none;
}

.mobile-img{
display:block;
position:relative;
z-index:2;
max-width:92vw;
max-height:92vh;
width:auto;
height:auto;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

.form-wrap{
bottom:12px;
}

.email-form{
flex-direction:column;
gap:6px;
padding:8px;
border-radius:18px;
background:rgba(255,255,255,0.10);
}

.email-form input{
width:200px;
font-size:13px;
padding:10px 12px;
}

.email-form input[name="neighborhood"]{
width:200px;
}

.email-form button{
width:200px;
font-size:13px;
padding:10px 12px;
}

}
</style>
