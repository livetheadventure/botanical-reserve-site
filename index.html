<!DOCTYPE html>
<html lang="en">
<head>

<title>The Botanical Reserve | DIY Flower Delivery Vancouver</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description" content="DIY flower delivery in Vancouver. Fresh flowers delivered for you to design your own bouquet at home. The Botanical Reserve.">

<meta name="robots" content="index, follow">

<meta property="og:title" content="The Botanical Reserve">
<meta property="og:description" content="Fresh Flowers. Designed by You.">
<meta property="og:image" content="frontpage.png">
<meta property="og:url" content="https://botanicalreserve.ca">

<link rel="canonical" href="https://botanicalreserve.ca">

<style>

html, body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* blurred background */
.bg{
position:fixed;
inset:0;
background-image:url("frontpage.png");
background-size:cover;
background-position:center;
filter:blur(18px);
transform:scale(1.1);
}

/* DESKTOP IMAGE */
.desktop-img{
position:relative;
z-index:2;
max-width:100%;
max-height:100vh;
width:auto;
height:auto;
display:block;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

/* MOBILE IMAGE */
.mobile-img{
display:none;
}

/* CTA BUTTON */
.cta{
position:absolute;
z-index:3;
bottom:42px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,0.92);
color:#2f2f2f;
text-decoration:none;
padding:12px 22px;
font-size:14px;
letter-spacing:0.02em;
border-radius:4px;
box-shadow:0 4px 20px rgba(0,0,0,0.10);
font-family:Georgia, serif;
cursor:pointer;
border:none;
}

.cta:hover{
background:white;
}

/* POPUP */
.popup{
display:none;
opacity:0;
position:fixed;
inset:0;
background:rgba(0,0,0,0.45);
z-index:20;
justify-content:center;
align-items:center;
transition:opacity 0.25s ease;
padding:20px;
}

.popup-content{
position:relative;
width:min(520px, 100%);
height:min(80vh, 700px);
background:#fff;
border-radius:8px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
}

.popup iframe{
width:100%;
height:100%;
border:none;
}

.close{
position:absolute;
top:10px;
right:14px;
font-size:26px;
cursor:pointer;
z-index:21;
background:white;
border-radius:50%;
width:30px;
height:30px;
display:flex;
align-items:center;
justify-content:center;
}

/* MOBILE */
@media (max-width:768px){

.bg{
background-image:url("frontpage-mobile.png");
transform:scale(1.15);
}

.desktop-img{
display:none;
}

.mobile-img{
display:block;
position:relative;
z-index:2;
max-width:92vw;
max-height:92vh;
}

.cta{
bottom:28px;
font-size:13px;
padding:10px 18px;
}

.popup-content{
height:85vh;
}

}

</style>

</head>

<body>

<h1 style="position:absolute;left:-9999px;">
The Botanical Reserve – DIY Flower Delivery Vancouver
</h1>

<div class="bg"></div>

<img src="frontpage.png"
class="desktop-img"
alt="The Botanical Reserve — Fresh Flowers. Designed by You.">

<img src="frontpage-mobile.png"
class="mobile-img"
alt="The Botanical Reserve — Fresh Flowers. Designed by You.">

<!-- BUTTON -->
<button class="cta" onclick="openForm()">
Get Early Access
</button>

<!-- POPUP -->
<div id="formPopup" class="popup">
  <div class="popup-content">
    <span class="close" onclick="closeForm()">×</span>

    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfG1H3nl3zO9Y6zNS9JJQvzZ5xmrhUDwsNMFoeocP0wtXe29A/viewform?embedded=true"></iframe>

  </div>
</div>

<script>
function openForm(){
  const popup = document.getElementById("formPopup");
  popup.style.display = "flex";
  setTimeout(() => popup.style.opacity = "1", 10);
}

function closeForm(){
  const popup = document.getElementById("formPopup");
  popup.style.opacity = "0";
  setTimeout(() => popup.style.display = "none", 250);
}

document.getElementById("formPopup").addEventListener("click", function(e){
  if(e.target === this){
    closeForm();
  }
});
</script>

</body>
</html>
