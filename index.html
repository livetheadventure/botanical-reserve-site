<!DOCTYPE html>
<html lang="en">
<head>

<title>The Botanical Reserve | DIY Flower Delivery Vancouver</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description" content="DIY flower delivery in Vancouver. Fresh flowers delivered for you to design your own bouquet at home. The Botanical Reserve.">

<meta name="robots" content="index, follow">

<meta property="og:title" content="The Botanical Reserve">
<meta property="og:description" content="Fresh Flowers. Designed by You.">
<meta property="og:image" content="frontpage.png">
<meta property="og:url" content="https://botanicalreserve.ca">

<link rel="canonical" href="https://botanicalreserve.ca">

<style>
html, body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* blurred background */
.bg{
position:fixed;
inset:0;
background-image:url("frontpage.png");
background-size:cover;
background-position:center;
filter:blur(18px);
transform:scale(1.1);
}

/* desktop image */
.desktop-img{
position:relative;
z-index:2;
max-width:100%;
max-height:100vh;
width:auto;
height:auto;
display:block;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

/* mobile image */
.mobile-img{
display:none;
}

/* button */
.cta{
position:absolute;
z-index:3;
bottom:42px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,0.9);
color:#2f2f2f;
text-decoration:none;
padding:12px 22px;
font-size:14px;
letter-spacing:0.02em;
border-radius:999px;
box-shadow:0 6px 24px rgba(0,0,0,0.12);
font-family:Georgia, serif;
cursor:pointer;
border:none;
backdrop-filter:blur(10px);
}

.cta:hover{
background:rgba(255,255,255,0.97);
}

/* popup overlay */
.popup{
display:none;
opacity:0;
position:fixed;
inset:0;
background:rgba(30,25,35,0.28);
backdrop-filter:blur(10px);
z-index:20;
justify-content:center;
align-items:center;
transition:opacity 0.28s ease;
padding:24px;
box-sizing:border-box;
}

/* popup card */
.popup-shell{
position:relative;
width:min(560px, 100%);
z-index:21;
}

.popup-header{
text-align:center;
margin-bottom:14px;
color:#ffffff;
font-family:Georgia, serif;
text-shadow:0 2px 10px rgba(0,0,0,0.18);
}

.popup-title{
font-size:28px;
line-height:1.2;
margin:0 0 6px 0;
font-weight:400;
}

.popup-subtitle{
font-size:14px;
line-height:1.5;
margin:0;
opacity:0.92;
letter-spacing:0.02em;
}

.popup-content{
position:relative;
width:100%;
height:min(74vh, 700px);
background:rgba(255,255,255,0.92);
border-radius:22px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.22);
border:1px solid rgba(255,255,255,0.45);
}

/* soft top glow */
.popup-content::before{
content:"";
position:absolute;
top:0;
left:0;
right:0;
height:1px;
background:rgba(255,255,255,0.9);
z-index:2;
}

.popup iframe{
width:100%;
height:100%;
border:none;
background:#fff;
}

.close{
position:absolute;
top:14px;
right:14px;
font-size:24px;
line-height:1;
cursor:pointer;
z-index:22;
background:rgba(255,255,255,0.88);
color:#444;
border-radius:50%;
width:34px;
height:34px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 16px rgba(0,0,0,0.12);
}

.close:hover{
background:white;
}

/* mobile */
@media (max-width:768px){

.bg{
background-image:url("frontpage-mobile.png");
transform:scale(1.15);
}

.desktop-img{
display:none;
}

.mobile-img{
display:block;
position:relative;
z-index:2;
max-width:92vw;
max-height:92vh;
width:auto;
height:auto;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

.cta{
bottom:28px;
font-size:13px;
padding:10px 18px;
}

.popup{
padding:14px;
}

.popup-title{
font-size:22px;
}

.popup-subtitle{
font-size:13px;
}

.popup-content{
height:82vh;
border-radius:18px;
}

.close{
top:10px;
right:10px;
width:32px;
height:32px;
font-size:22px;
}

}
</style>

</head>

<body>

<h1 style="position:absolute;left:-9999px;">
The Botanical Reserve – DIY Flower Delivery Vancouver
</h1>

<div class="bg"></div>

<img src="frontpage.png"
class="desktop-img"
alt="The Botanical Reserve — Fresh Flowers. Designed by You.">

<img src="frontpage-mobile.png"
class="mobile-img"
alt="The Botanical Reserve — Fresh Flowers. Designed by You.">

<button class="cta" onclick="openForm()">
Get Early Access
</button>

<div id="formPopup" class="popup">
  <div class="popup-shell">
    <div class="popup-header">
      <h2 class="popup-title">Join the Early List</h2>
      <p class="popup-subtitle">Be first to hear when The Botanical Reserve opens.</p>
    </div>

    <div class="popup-content">
      <span class="close" onclick="closeForm()">&times;</span>
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfG1H3nl3zO9Y6zNS9JJQvzZ5xmrhUDwsNMFoeocP0wtXe29A/viewform?embedded=true"></iframe>
    </div>
  </div>
</div>

<script>
function openForm(){
  const popup = document.getElementById("formPopup");
  popup.style.display = "flex";
  setTimeout(() => {
    popup.style.opacity = "1";
  }, 10);
}

function closeForm(){
  const popup = document.getElementById("formPopup");
  popup.style.opacity = "0";
  setTimeout(() => {
    popup.style.display = "none";
  }, 280);
}

document.getElementById("formPopup").addEventListener("click", function(e){
  if(e.target === this){
    closeForm();
  }
});
</script>

</body>
</html>
