<!DOCTYPE html>
<html lang="en">
<head>

<title>The Botanical Reserve | DIY Flower Kits Vancouver</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="The Botanical Reserve offers fresh flower kits delivered weekly in Vancouver. Design your own bouquet at home with curated stems and simple, beautiful presentation.">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#f7f3ee">

<link rel="canonical" href="https://botanicalreserve.ca">

<meta property="og:title" content="The Botanical Reserve">
<meta property="og:description" content="Flower Kits, Delivered Weekly. Designed by You.">
<meta property="og:image" content="https://botanicalreserve.ca/frontpage.png">

<meta name="twitter:card" content="summary_large_image">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;}

html, body{
margin:0;
padding:0;
height:100%;
}

body{
display:flex;
justify-content:center;
align-items:center;
position:relative;
font-family:'Playfair Display', serif;
background:#f7f3ee;
}

/* background */
.bg{
position:fixed;
inset:0;
background-image:url("frontpage.png");
background-size:cover;
background-position:center;
filter:blur(18px);
transform:scale(1.1);
z-index:0;
}

/* top banner */
.top-banner{
position:fixed;
top:16px;
left:50%;
transform:translateX(-50%);
z-index:5;
padding:10px 20px;
border-radius:999px;
background:rgba(255,255,255,0.16);
backdrop-filter:blur(14px);
box-shadow:0 8px 24px rgba(0,0,0,0.08);
color:#3f3a3a;
font-size:15px;
white-space:nowrap;
}

/* hero text */
.hero-text{
position:absolute;
top:28%;
left:50%;
transform:translate(-50%, -50%);
z-index:3;
text-align:center;
color:#3f3a3a;
max-width:800px;
width:90%;
}

.hero-text .brand{
font-size:42px;
letter-spacing:0.08em;
font-weight:500;
margin-bottom:18px;
line-height:1.1;
}

.hero-text .sub{
font-size:20px;
margin-bottom:10px;
line-height:1.3;
}

.hero-text .tag{
font-size:18px;
font-style:italic;
opacity:0.85;
line-height:1.3;
}

.hero-text .brand,
.hero-text .sub,
.hero-text .tag{
text-shadow:0 2px 10px rgba(255,255,255,0.35);
}

/* image */
.desktop-img{
position:relative;
z-index:2;
max-width:100%;
max-height:100vh;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

/* desktop form */
.form-wrap{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
z-index:4;
}

.email-form{
display:flex;
gap:10px;
padding:10px;
border-radius:999px;
background:rgba(255,255,255,0.14);
backdrop-filter:blur(14px);
box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

.email-form input,
.email-form select,
.email-form button{
height:44px;
border-radius:999px;
border:none;
font-family:'Playfair Display', serif;
padding:0 14px;
font-size:15px;
}

.email-form input,
.email-form select{
background:white;
min-width:210px;
color:#000;
}

.email-form button{
background:white;
cursor:pointer;
white-space:nowrap;
min-width:190px;
padding:0 20px;
color:#000;
display:flex;
align-items:center;
justify-content:center;
}

/* MOBILE */
@media (max-width:768px){

body{
display:block;
overflow-x:hidden;
}

/* remove blur */
.bg{display:none;}

/* image */
.desktop-img{
position:relative;
width:100%;
height:auto;
max-width:none;
max-height:none;
box-shadow:none;
}

/* text */
.hero-text{
top:140px;
transform:translateX(-50%);
}

.hero-text .brand{
font-size:29px;
margin-bottom:18px;
}

.hero-text .sub{font-size:16px;}
.hero-text .tag{font-size:14px;}

/* hide original form */
.form-wrap{
display:none;
}

/* quick email */
.quick-email{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:88%;
max-width:360px;
z-index:4;
}

.quick-email input{
width:100%;
height:52px;
border-radius:999px;
border:none;
padding:0 20px;
font-size:15px;
font-family:'Playfair Display', serif;
background:white;
box-shadow:0 8px 24px rgba(0,0,0,0.12);
}

}

/* full form section */
.full-form-section{
padding:60px 20px 40px;
background:#f7f3ee;
display:flex;
justify-content:center;
}

.full-form-section .email-form{
flex-direction:column;
gap:10px;
width:100%;
max-width:360px;
background:white;
padding:16px;
border-radius:20px;
box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

.full-form-section input,
.full-form-section select,
.full-form-section button{
width:100%;
height:50px;
border-radius:999px;
border:none;
padding:0 18px;
font-family:'Playfair Display', serif;
font-size:14px;
}

.full-form-section button{
background:#000;
color:#fff;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="top-banner">
  Launching in Vancouver
</div>

<div class="hero-text">
  <div class="brand">The Botanical<br>Reserve</div>
  <div class="sub">Flower Kits, Delivered Weekly</div>
  <div class="tag">Designed by You.</div>
</div>

<img src="frontpage.png" class="desktop-img">

<!-- DESKTOP FORM -->
<div class="form-wrap">
<form class="email-form">
<input type="email" placeholder="Enter your email" required>

<select required>
<option value="">Select your neighbourhood</option>
<option>Dunbar</option>
<option>Kerrisdale</option>
<option>South Granville</option>
<option>Shaughnessy</option>
<option>Point Grey</option>
<option>West Point Grey</option>
<option>Arbutus Ridge</option>
<option>South Cambie</option>
<option>Oakridge</option>
<option>Kitsilano</option>
<option>Fairview</option>
<option>West End</option>
<option>Downtown</option>
<option>Yaletown</option>
<option>Olympic Village</option>
<option>False Creek</option>
<option>Mount Pleasant</option>
<option>Main Street</option>
<option>Riley Park</option>
<option>Cambie Village</option>
<option>Marpole</option>
<option>Sunset</option>
<option>Killarney</option>
<option>Renfrew-Collingwood</option>
<option>Hastings-Sunrise</option>
<option>Grandview-Woodland</option>
<option>Cedar Cottage</option>
<option>Kensington-Cedar Cottage</option>
<option>Victoria-Fraserview</option>
<option>Strathcona</option>
<option>Chinatown</option>
</select>

<button type="submit">Join Limited Release</button>
</form>
</div>

<!-- MOBILE QUICK EMAIL -->
<div class="quick-email">
  <input id="quickEmail" type="email" placeholder="Enter your email">
</div>

<!-- FULL FORM BELOW -->
<div id="fullForm" class="full-form-section">
<form class="email-form">
<input id="mainEmail" type="email" placeholder="Enter your email" required>

<select required>
<option value="">Select your neighbourhood</option>
<option>Dunbar</option>
<option>Kerrisdale</option>
<option>South Granville</option>
<option>Shaughnessy</option>
<option>Point Grey</option>
<option>West Point Grey</option>
<option>Arbutus Ridge</option>
<option>South Cambie</option>
<option>Oakridge</option>
<option>Kitsilano</option>
<option>Fairview</option>
<option>West End</option>
<option>Downtown</option>
<option>Yaletown</option>
<option>Olympic Village</option>
<option>False Creek</option>
<option>Mount Pleasant</option>
<option>Main Street</option>
<option>Riley Park</option>
<option>Cambie Village</option>
<option>Marpole</option>
<option>Sunset</option>
<option>Killarney</option>
<option>Renfrew-Collingwood</option>
<option>Hastings-Sunrise</option>
<option>Grandview-Woodland</option>
<option>Cedar Cottage</option>
<option>Kensington-Cedar Cottage</option>
<option>Victoria-Fraserview</option>
<option>Strathcona</option>
<option>Chinatown</option>
</select>

<button type="submit">Join Limited Release</button>
</form>
</div>

<script>
const quickEmail = document.getElementById("quickEmail");
const mainEmail = document.getElementById("mainEmail");
const fullForm = document.getElementById("fullForm");

quickEmail.addEventListener("focus", () => {
  fullForm.scrollIntoView({ behavior: "smooth" });

  setTimeout(() => {
    mainEmail.value = quickEmail.value;
    mainEmail.focus();
  }, 400);
});
</script>

</body>
</html>
