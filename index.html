<!DOCTYPE html>
<html lang="en">
<head>

<title>The Botanical Reserve | DIY Flower Delivery Vancouver</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description" content="DIY flower delivery in Vancouver. Fresh flowers delivered for you to design your own bouquet at home. The Botanical Reserve.">

<meta name="robots" content="index, follow">

<meta property="og:title" content="The Botanical Reserve">
<meta property="og:description" content="Fresh Flowers. Designed by You.">
<meta property="og:image" content="frontpage.png">
<meta property="og:url" content="https://botanicalreserve.ca">

<link rel="canonical" href="https://botanicalreserve.ca">

<style>

html, body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* blurred background */

.bg{
position:fixed;
inset:0;
background-image:url("frontpage.png");
background-size:cover;
background-position:center;
filter:blur(18px);
transform:scale(1.1);
}

/* DESKTOP IMAGE */
.desktop-img{
position:relative;
z-index:2;
max-width:100%;
max-height:100vh;
width:auto;
height:auto;
display:block;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

/* MOBILE IMAGE (hidden by default) */
.mobile-img{
display:none;
}

/* email button */
.cta{
position:absolute;
z-index:3;
bottom:42px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,0.92);
color:#2f2f2f;
text-decoration:none;
padding:12px 22px;
font-size:14px;
line-height:1;
letter-spacing:0.02em;
border-radius:4px;
box-shadow:0 4px 20px rgba(0,0,0,0.10);
font-family:Georgia, serif;
white-space:nowrap;
}

.cta:hover{
background:white;
}

/* mobile */

@media (max-width:768px){

.bg{
background-image:url("frontpage-mobile.png");
transform:scale(1.15);
}

/* hide desktop image */
.desktop-img{
display:none;
}

/* show mobile image */
.mobile-img{
display:block;
position:relative;
z-index:2;
max-width:92vw;
max-height:92vh;
width:auto;
height:auto;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

.cta{
bottom:28px;
padding:10px 18px;
font-size:13px;
}

}

</style>

</head>

<body>

<!-- Hidden heading for Google -->
<h1 style="position:absolute;left:-9999px;">
The Botanical Reserve – DIY Flower Delivery Vancouver
</h1>

<div class="bg"></div>

<!-- Desktop image -->
<img src="frontpage.png"
class="desktop-img"
alt="The Botanical Reserve — Fresh Flowers. Designed by You."
loading="eager">

<!-- Mobile image -->
<img src="frontpage-mobile.png"
class="mobile-img"
alt="The Botanical Reserve — Fresh Flowers. Designed by You.">

<!-- Email capture button -->
<a href="https://forms.gle/iYEt3qF7gRcVtbXN7" target="_blank" class="cta">
Get Early Access
</a>

</body>
</html>
