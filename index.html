<!DOCTYPE html>
<html lang="en">
<head>
  <title>The Botanical Reserve | DIY Flower Kits Vancouver</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="The Botanical Reserve offers fresh flower kits delivered weekly in Vancouver. Design your own bouquet at home with curated stems and simple, beautiful presentation.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#f7f3ee">

  <link rel="canonical" href="https://botanicalreserve.ca">

  <meta property="og:title" content="The Botanical Reserve">
  <meta property="og:description" content="Flower Kits, Delivered Weekly. Designed by You.">
  <meta property="og:image" content="https://botanicalreserve.ca/frontpage.png">

  <meta name="twitter:card" content="summary_large_image">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      padding:0;
      width:100%;
    }

    body{
      font-family:'Playfair Display', serif;
      background:#f7f3ee;
      color:#3f3a3a;
      overflow-x:hidden;
    }

    .page{
      position:relative;
      min-height:100vh;
      min-height:100svh;
      min-height:100dvh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .bg{
      position:fixed;
      inset:0;
      background-image:url("frontpage.png");
      background-size:cover;
      background-position:center;
      filter:blur(18px);
      transform:scale(1.08);
      z-index:0;
    }

    .top-banner{
      position:fixed;
      top:16px;
      left:50%;
      transform:translateX(-50%);
      z-index:5;
      padding:10px 20px;
      border-radius:999px;
      background:rgba(255,255,255,0.16);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      box-shadow:0 8px 24px rgba(0,0,0,0.08);
      font-size:15px;
      white-space:nowrap;
    }

    .hero{
      position:relative;
      z-index:2;
      width:100%;
      max-width:1400px;
      min-height:100vh;
      min-height:100svh;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      align-items:center;
      padding:110px 24px 24px;
    }

    .hero-image{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      z-index:1;
      box-shadow:0 10px 40px rgba(0,0,0,0.15);
    }

    .hero-text{
      position:relative;
      z-index:3;
      text-align:center;
      width:90%;
      max-width:900px;
      margin-top:60px;
    }

    .brand{
      font-size:42px;
      letter-spacing:0.08em;
      font-weight:500;
      margin-bottom:14px;
      line-height:1.1;
      text-shadow:0 2px 10px rgba(255,255,255,0.35);
    }

    .sub{
      font-size:20px;
      margin-bottom:10px;
      line-height:1.3;
      text-shadow:0 2px 10px rgba(255,255,255,0.35);
    }

    .tag{
      font-size:18px;
      font-style:italic;
      opacity:0.85;
      line-height:1.3;
      text-shadow:0 2px 10px rgba(255,255,255,0.35);
    }

    .form-wrap{
      position:relative;
      z-index:4;
      margin-bottom:10px;
    }

    .email-form{
      display:flex;
      gap:10px;
      padding:10px;
      border-radius:999px;
      background:rgba(255,255,255,0.14);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      box-shadow:0 8px 24px rgba(0,0,0,0.08);
    }

    .email-form input,
    .email-form select,
    .email-form button{
      height:44px;
      border-radius:999px;
      border:none;
      font-family:'Playfair Display', serif;
      padding:0 14px;
      font-size:15px;
    }

    .email-form input,
    .email-form select{
      background:#fff;
      min-width:210px;
      color:#000;
    }

    .email-form button{
      background:#fff;
      color:#000;
      cursor:pointer;
      white-space:nowrap;
      min-width:190px;
      padding:0 20px;
    }

    @media (max-width:768px){

      .bg{
        display:none;
      }

      .page{
        min-height:100svh;
        min-height:100dvh;
      }

      .hero{
        min-height:100svh;
        min-height:100dvh;
        padding:
          calc(env(safe-area-inset-top) + 70px)
          18px
          calc(env(safe-area-inset-bottom) + 14px);
        justify-content:space-between;
      }

      .hero-image{
        object-fit:cover;
        object-position:center 58%;
        box-shadow:none;
      }

      .top-banner{
        top:calc(env(safe-area-inset-top) + 12px);
        font-size:14px;
        padding:10px 18px;
      }

      .hero-text{
        width:90%;
        max-width:none;
        margin-top:0;
      }

      .brand{
        font-size:29px;
        letter-spacing:0.03em;
        margin-bottom:8px;
      }

      .sub{
        font-size:16px;
        margin-bottom:6px;
      }

      .tag{
        font-size:14px;
      }

      .form-wrap{
        width:100%;
        max-width:360px;
        margin-bottom:0;
      }

      .email-form{
        display:flex;
        flex-direction:column;
        gap:8px;
        padding:12px;
        border-radius:20px;
        background:rgba(255,255,255,0.18);
        backdrop-filter:blur(10px);
        -webkit-backdrop-filter:blur(10px);
      }

      .email-form input,
      .email-form select,
      .email-form button{
        width:100%;
        height:48px;
        font-size:14px;
        padding:0 18px;
      }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="top-banner">Launching in Vancouver</div>

  <div class="page">
    <section class="hero">
      <img src="frontpage.png" class="hero-image" alt="The Botanical Reserve floral bicycle scene">

      <div class="hero-text">
        <div class="brand">The Botanical Reserve</div>
        <div class="sub">Flower Kits, Delivered Weekly</div>
        <div class="tag">Designed by You.</div>
      </div>

      <div class="form-wrap">
        <form class="email-form">
          <input type="email" placeholder="Enter your email" required>

          <select required>
            <option value="">Select your neighbourhood</option>
            <option>Dunbar</option>
            <option>Kerrisdale</option>
            <option>South Granville</option>
            <option>Shaughnessy</option>
            <option>Point Grey</option>
            <option>West Point Grey</option>
            <option>Arbutus Ridge</option>
            <option>South Cambie</option>
            <option>Oakridge</option>
            <option>Kitsilano</option>
            <option>Fairview</option>
            <option>West End</option>
            <option>Downtown</option>
            <option>Yaletown</option>
            <option>Olympic Village</option>
            <option>False Creek</option>
            <option>Mount Pleasant</option>
            <option>Main Street</option>
            <option>Riley Park</option>
            <option>Cambie Village</option>
            <option>Marpole</option>
            <option>Sunset</option>
            <option>Killarney</option>
            <option>Renfrew-Collingwood</option>
            <option>Hastings-Sunrise</option>
            <option>Grandview-Woodland</option>
            <option>Cedar Cottage</option>
            <option>Kensington-Cedar Cottage</option>
            <option>Victoria-Fraserview</option>
            <option>Strathcona</option>
            <option>Chinatown</option>
          </select>

          <button type="submit">Join Limited Release</button>
        </form>
      </div>
    </section>
  </div>

</body>
</html>
