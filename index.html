<!DOCTYPE html>
<html lang="en">
<head>

<title>The Botanical Reserve | DIY Flower Delivery Vancouver</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description" content="DIY flower delivery in Vancouver. Fresh flowers delivered for you to design your own bouquet at home. The Botanical Reserve.">

<meta name="robots" content="index, follow">

<meta property="og:title" content="The Botanical Reserve">
<meta property="og:description" content="Fresh Flowers. Designed by You.">
<meta property="og:image" content="frontpage.png">
<meta property="og:url" content="https://botanicalreserve.ca">

<link rel="canonical" href="https://botanicalreserve.ca">

<style>
html, body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
position:relative;
font-family:Georgia, serif;
}

/* blurred background */
.bg{
position:fixed;
inset:0;
background-image:url("frontpage.png");
background-size:cover;
background-position:center;
filter:blur(18px);
transform:scale(1.1);
}

/* top announcement */
.top-banner{
position:fixed;
top:16px;
left:50%;
transform:translateX(-50%);
z-index:5;
text-align:center;
padding:10px 18px;
border-radius:999px;
background:rgba(255,255,255,0.16);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);
box-shadow:0 8px 24px rgba(0,0,0,0.08);
color:#3f3a3a;
max-width:90vw;
}

.top-banner .line1{
display:block;
font-size:14px;
letter-spacing:0.03em;
}

.top-banner .line2{
display:block;
font-size:12px;
font-style:italic;
margin-top:2px;
color:rgba(63,58,58,0.9);
}

/* desktop image */
.desktop-img{
position:relative;
z-index:2;
max-width:100%;
max-height:100vh;
width:auto;
height:auto;
display:block;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

/* mobile image */
.mobile-img{
display:none;
}

/* bottom bar wrap */
.form-wrap{
position:fixed;
left:50%;
bottom:20px;
transform:translateX(-50%);
z-index:4;
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
}

/* form bar */
.email-form{
display:flex;
align-items:center;
gap:8px;
margin:0;
padding:8px 10px;
border-radius:999px;
background:rgba(255,255,255,0.14);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);
box-shadow:0 10px 30px rgba(0,0,0,0.10);
}

.email-form input{
width:185px;
padding:11px 14px;
border:none;
border-radius:999px;
font-size:13px;
font-family:Georgia, serif;
color:#2f2f2f;
background:rgba(255,255,255,0.92);
box-shadow:0 4px 14px rgba(0,0,0,0.08);
outline:none;
box-sizing:border-box;
}

.email-form input[name="neighborhood"]{
width:175px;
}

.email-form input::placeholder{
color:#666;
}

.email-form button{
padding:11px 16px;
border:none;
border-radius:999px;
font-size:13px;
font-family:Georgia, serif;
color:#2f2f2f;
background:rgba(255,255,255,0.96);
box-shadow:0 4px 14px rgba(0,0,0,0.08);
cursor:pointer;
white-space:nowrap;
transition:background 0.2s ease, transform 0.2s ease;
}

.email-form button:hover{
background:white;
transform:translateY(-1px);
}

/* mobile */
@media (max-width:768px){

.bg{
background-image:url("frontpage-mobile.png");
transform:scale(1.15);
}

.top-banner{
top:10px;
display:flex;
align-items:center;
justify-content:center;
gap:6px;
padding:6px 10px;
max-width:95vw;
white-space:nowrap;
text-align:center;
}

.top-banner .line1,
.top-banner .line2,
.top-banner .separator{
display:inline;
margin:0;
}

.top-banner .line1{
font-size:11px;
letter-spacing:0.02em;
}

.top-banner .separator{
font-size:10px;
opacity:0.65;
}

.top-banner .line2{
font-size:10px;
font-style:italic;
color:rgba(63,58,58,0.9);
}

.desktop-img{
display:none;
}

.mobile-img{
display:block;
position:relative;
z-index:2;
max-width:92vw;
max-height:92vh;
width:auto;
height:auto;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

.form-wrap{
bottom:14px;
gap:6px;
}

.email-form{
flex-direction:column;
gap:6px;
padding:8px;
border-radius:20px;
background:rgba(255,255,255,0.10);
}

.email-form input{
width:210px;
font-size:13px;
padding:10px 12px;
}

.email-form input[name="neighborhood"]{
width:210px;
}

.email-form button{
width:210px;
font-size:13px;
padding:10px 12px;
}

}
</style>

</head>

<body>

<h1 style="position:absolute;left:-9999px;">
The Botanical Reserve – DIY Flower Delivery Vancouver
</h1>

<div class="bg"></div>

<div class="top-banner">
  <span class="line1">Flower Kits. Delivered Weekly.</span>
  <span class="separator">•</span>
  <span class="line2">Launching in Vancouver</span>
</div>

<img src="frontpage.png"
class="desktop-img"
alt="The Botanical Reserve — Fresh Flower Kits. Delivered Weekly. Designed by You.">

<img src="frontpage-mobile.png"
class="mobile-img"
alt="The Botanical Reserve — Fresh Flower Kits. Delivered Weekly. Designed by You.">

<div class="form-wrap">
  <form action="https://formspree.io/f/xojkpqqv" method="POST" class="email-form">
    <input type="email" name="email" placeholder="Enter your email" required>
    <input type="text" name="neighborhood" placeholder="Neighbourhood(optional)">
    <button type="submit">Join Neighbourhood Waitlist</button>
  </form>
</div>

</body>
</html>
