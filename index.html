<!DOCTYPE html>
<html lang="en">
<head>

<title>The Botanical Reserve | DIY Flower Kits Vancouver</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="The Botanical Reserve offers fresh flower kits delivered weekly in Vancouver. Design your own bouquet at home with curated stems and simple, beautiful presentation.">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#f7f3ee">

<link rel="canonical" href="https://botanicalreserve.ca">

<meta property="og:title" content="The Botanical Reserve">
<meta property="og:description" content="Fresh Flower Kits. Delivered Weekly. Designed by You.">
<meta property="og:image" content="https://botanicalreserve.ca/frontpage.png">

<meta name="twitter:card" content="summary_large_image">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>
html, body{
margin:0;
padding:0;
min-height:100%;
}

body{
position:relative;
font-family:'Playfair Display', serif;
background:#f7f3ee;
overflow-x:hidden;
}

/* background blur */
.bg{
position:fixed;
inset:0;
background-image:url("frontpage.png");
background-size:cover;
background-position:center;
filter:blur(18px);
transform:scale(1.1);
z-index:0;
}

/* top banner */
.top-banner{
position:fixed;
top:16px;
left:50%;
transform:translateX(-50%);
z-index:5;
padding:10px 20px;
border-radius:999px;
background:rgba(255,255,255,0.18);
backdrop-filter:blur(14px);
box-shadow:0 8px 24px rgba(0,0,0,0.08);
color:#3f3a3a;
font-size:15px;
white-space:nowrap;
}

/* main hero image */
.desktop-img{
position:relative;
display:block;
z-index:1;
width:100%;
height:100vh;
object-fit:cover;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

/* hero text */
.hero-text{
position:absolute;
top:35%;
left:50%;
transform:translate(-50%, -50%);
z-index:3;
text-align:center;
color:#3f3a3a;
width:min(90%, 900px);
}

.hero-text .brand{
font-size:56px;
letter-spacing:0.06em;
font-weight:500;
margin-bottom:14px;
line-height:1.08;
}

.hero-text .sub{
font-size:24px;
margin-bottom:10px;
line-height:1.3;
}

.hero-text .tag{
font-size:20px;
font-style:italic;
opacity:0.88;
line-height:1.3;
}

.hero-text .brand,
.hero-text .sub,
.hero-text .tag{
text-shadow:0 2px 12px rgba(255,255,255,0.28);
}

/* form */
.form-wrap{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
z-index:4;
width:auto;
}

.email-form{
display:flex;
gap:10px;
padding:10px;
border-radius:999px;
background:rgba(255,255,255,0.14);
backdrop-filter:blur(14px);
box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

.email-form input,
.email-form select,
.email-form button{
height:46px;
border-radius:999px;
border:none;
font-family:'Playfair Display', serif;
padding:0 16px;
font-size:15px;
box-sizing:border-box;
}

.email-form input,
.email-form select{
background:white;
min-width:210px;
}

.email-form button{
background:white;
cursor:pointer;
white-space:nowrap;
}

/* mobile */
@media (max-width:768px){

html, body{
min-height:100%;
}

body{
overflow-y:auto;
}

.bg{
background-image:url("frontpage-mobile.png");
background-position:center;
}

.top-banner{
top:12px;
padding:9px 16px;
font-size:13px;
}

.desktop-img{
content:url("frontpage-mobile.png");
width:100%;
height:100vh;
object-fit:cover;
object-position:center;
}

.hero-text{
top:27%;
width:88%;
}

.hero-text .brand{
font-size:34px;
letter-spacing:0.04em;
margin-bottom:10px;
}

.hero-text .sub{
font-size:18px;
margin-bottom:8px;
}

.hero-text .tag{
font-size:16px;
}

.form-wrap{
position:absolute;
left:50%;
bottom:28px;
transform:translateX(-50%);
width:88%;
}

.email-form{
flex-direction:column;
gap:10px;
padding:14px;
border-radius:24px;
}

.email-form input,
.email-form select,
.email-form button{
width:100%;
min-width:0;
height:48px;
font-size:15px;
}
}
</style>

</head>

<body>

<div class="bg"></div>

<div class="top-banner">
Launching in Vancouver
</div>

<div class="hero-text">
<div class="brand">The Botanical Reserve</div>
<div class="sub">Weekly Flower Kits. Delivered Weekly</div>
<div class="tag">Designed by You.</div>
</div>

<img src="frontpage.png" class="desktop-img" alt="The Botanical Reserve floral landscape">

<div class="form-wrap">
<form class="email-form">
<input type="email" placeholder="Enter your email" required>
<select>
<option>Select your neighbourhood</option>
<option>Kitsilano</option>
<option>Downtown</option>
<option>Yaletown</option>
<option>Mount Pleasant</option>
</select>
<button type="submit">Join Limited Release</button>
</form>
</div>

</body>
</html>
