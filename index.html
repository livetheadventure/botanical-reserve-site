<!DOCTYPE html>
<html lang="en">
<head>

<title>The Botanical Reserve | DIY Flower Kits Vancouver</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="The Botanical Reserve offers fresh flower kits delivered weekly in Vancouver. Design your own bouquet at home with curated stems and simple, beautiful presentation.">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#f7f3ee">

<link rel="canonical" href="https://botanicalreserve.ca">

<meta property="og:title" content="The Botanical Reserve">
<meta property="og:description" content="Flower Kits, Delivered Weekly. Designed by You.">
<meta property="og:image" content="https://botanicalreserve.ca/frontpage.png">

<meta name="twitter:card" content="summary_large_image">

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  font-family: 'Playfair Display', serif;
  background: #f7f3ee;
  overflow-x: hidden;
}

/* background */
.bg {
  display: none;
}

/* elite flower intro */
.petal-intro{
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 9999;
  opacity: 1;
  transition: opacity 2.5s ease;
}

.petal-intro.fade-out{
  opacity: 0;
}

.petal-layer{
  position: absolute;
  inset: 0;
}

.petal{
  position: absolute;
  top: -60px;
  animation: fall linear forwards;
  will-change: transform, opacity;
}

.back .petal{
  filter: blur(0.6px);
  opacity: 0.4;
}

.mid .petal{
  filter: blur(0.2px);
  opacity: 0.65;
}

.front .petal{
  opacity: 0.9;
}

.petal svg{
  display: block;
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.06));
}

@keyframes fall{
  0%{
    transform: translate3d(0,0,0) rotate(0deg);
    opacity: 0;
  }
  10%{
    opacity: var(--o);
  }
  100%{
    transform: translate3d(var(--x), 110vh, 0) rotate(var(--r));
    opacity: 0;
  }
}

/* top banner */
.top-banner {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  padding: 10px 20px;
  border-radius: 999px;
  background: rgba(255,255,255,0.16);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  color: #3f3a3a;
  font-size: 15px;
  white-space: nowrap;
}

/* hero text */
.hero-text {
  position: absolute;
  top: 28%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 3;
  text-align: center;
  color: #3f3a3a;
  max-width: 900px;
  width: 90%;
}

.hero-text .brand {
  font-size: 42px;
  letter-spacing: 0.08em;
  font-weight: 500;
  margin-bottom: 18px;
  line-height: 1.1;
  white-space: nowrap;
}

.hero-text .sub {
  font-size: 20px;
  margin-bottom: 10px;
  line-height: 1.3;
}

.hero-text .tag {
  font-size: 18px;
  font-style: italic;
  opacity: 0.85;
  line-height: 1.3;
}

.hero-text .brand,
.hero-text .sub,
.hero-text .tag {
  text-shadow: 0 2px 10px rgba(255,255,255,0.35);
}

/* image */
.desktop-img {
  position: fixed;
  inset: 0;
  z-index: 1;
  width: 100%;
  height: 100vh;
  object-fit: cover;
  object-position: center center;
  box-shadow: none;
  display: block;
}

/* desktop form */
.form-wrap {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 4;
}

.email-form {
  display: flex;
  gap: 10px;
  padding: 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.14);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

.email-form input:focus,
.email-form select:focus {
  outline: none;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.10);
}

.email-form button {
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.email-form button:active {
  transform: scale(0.97);
}

.email-form input,
.email-form select,
.email-form button {
  height: 44px;
  border-radius: 999px;
  border: none;
  font-family: 'Playfair Display', serif;
  padding: 0 14px;
  font-size: 15px;
}

.email-form input,
.email-form select {
  background: white;
  min-width: 210px;
  color: #000;
}

.email-form button {
  background: white;
  cursor: pointer;
  white-space: nowrap;
  min-width: 190px;
  padding: 0 20px;
  color: #000;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* hide mobile-only elements on desktop */
.quick-email,
.full-form-section {
  display: none;
}

/* MOBILE ONLY */
@media (max-width: 768px) {

  body {
    display: block;
    overflow-y: hidden;
  }

  .bg {
    display: none;
  }

  .top-banner {
    top: calc(env(safe-area-inset-top, 0px) + 14px);
    font-size: 14px;
    padding: 11px 22px;
  }

  .hero-text {
    top: 18%;
    left: 50%;
    transform: translate(-50%, 0);
    width: 88%;
  }

  .hero-text .brand {
    white-space: nowrap;
    line-height: 1.1;
    padding: 0 10px;
    font-size: clamp(20px, 6vw, 29px);
  }

  .hero-text .sub {
    font-size: 15px;
  }

  .hero-text .tag {
    font-size: 13px;
  }

  .desktop-img {
    position: relative;
    inset: auto;
    width: 100%;
    height: 100svh;
    height: 100dvh;
    object-fit: cover;
    object-position: center 44%;
    box-shadow: none;
  }

  .form-wrap {
    display: none;
  }

  .quick-email {
    display: none;
  }

  .full-form-section {
    display: block;
    position: absolute;
    left: 50%;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 2px);
    transform: translateX(-50%) scale(0.86);
    transform-origin: bottom center;
    width: 80%;
    max-width: 300px;
    z-index: 4;
  }

  .full-form-section .email-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: rgba(255,255,255,0.14);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 8px;
    border-radius: 18px;
  }

  .full-form-section input,
  .full-form-section select,
  .full-form-section button {
    height: 42px;
    font-size: 13px;
    width: 100%;
    min-width: 0;
  }

  .petal-intro{
    display: none;
  }
}
</style>
</head>

<script>
(function () {
  const intro = document.querySelector('.petal-intro');
  const back = document.getElementById('petalBack');
  const mid = document.getElementById('petalMid');
  const front = document.getElementById('petalFront');

  if (!intro || !back || !mid || !front) return;

  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReducedMotion) {
    intro.remove();
    return;
  }

  const COLORS = [
    '#f6efe7',
    '#f2d9d2',
    '#edd3cc',
    '#f4e4dc',
    '#e8cfc8',
    '#f5eedf',
    '#f1d8e6',
    '#efe7c9'
  ];

  function rand(min, max) {
    return Math.random() * (max - min) + min;
  }

  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function petal(color) {
    return `
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M20 4C26 10 32 16 30 25C28 34 23 38 20 38C17 38 12 34 10 25C8 16 14 10 20 4Z" fill="${color}"/>
      </svg>
    `;
  }

  function create(layer, depth) {
    const el = document.createElement('div');
    el.className = 'petal';

    let size, duration, drift, rotate, opacity;

    if (depth === 'back') {
      size = rand(10, 16);
      duration = rand(10, 14);
      drift = rand(-40, 40);
      rotate = rand(60, 140);
      opacity = rand(0.3, 0.5);
    } else if (depth === 'mid') {
      size = rand(14, 22);
      duration = rand(8, 11);
      drift = rand(-60, 60);
      rotate = rand(100, 220);
      opacity = rand(0.5, 0.75);
    } else {
      size = rand(18, 28);
      duration = rand(6, 9);
      drift = rand(-80, 80);
      rotate = rand(140, 320);
      opacity = rand(0.7, 0.95);
    }

    const xStart = rand(12, 88);
    const yOffset = rand(-90, -20);

    el.style.left = xStart + 'vw';
    el.style.top = yOffset + 'px';
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.animationDuration = duration + 's';
    el.style.setProperty('--x', drift + 'px');
    el.style.setProperty('--r', rotate + 'deg');
    el.style.setProperty('--o', opacity);
    el.innerHTML = petal(pick(COLORS));

    layer.appendChild(el);
    setTimeout(() => el.remove(), duration * 1000);
  }

  function burst(layer, depth, count) {
    for (let i = 0; i < count; i++) {
      setTimeout(() => create(layer, depth), rand(0, 2200));
    }
  }

  burst(back, 'back', 10);
  burst(mid, 'mid', 8);
  burst(front, 'front', 6);

  const backInterval = setInterval(() => create(back, 'back'), 900);
  const midInterval = setInterval(() => create(mid, 'mid'), 1200);
  const frontInterval = setInterval(() => create(front, 'front'), 1600);

  setTimeout(() => {
    intro.classList.add('fade-out');
    clearInterval(backInterval);
    clearInterval(midInterval);
    clearInterval(frontInterval);
  }, 10000);

  setTimeout(() => {
    intro.remove();
  }, 12500);
})();

document.querySelectorAll('.email-form').forEach(form => {
  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const button = form.querySelector('button');
    const originalText = button.textContent;
    button.textContent = 'Joining...';
    button.disabled = true;

    const formData = new FormData(form);

    try {
      const response = await fetch('https://formspree.io/f/xojkpqqv', {
        method: 'POST',
        body: formData,
        headers: {
          'Accept': 'application/json'
        }
      });

      if (response.ok) {
        window.location.href = 'thanks.html';
      } else {
        button.textContent = originalText;
        button.disabled = false;
        alert('Something went wrong. Please try again.');
      }
    } catch (error) {
      button.textContent = originalText;
      button.disabled = false;
      alert('Network error. Please try again.');
    }
  });
});
</script>
