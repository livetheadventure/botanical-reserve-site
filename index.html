<!DOCTYPE html>
<html lang="en">
<head>

<title>The Botanical Reserve | DIY Flower Kits Vancouver</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="The Botanical Reserve offers fresh flower kits delivered weekly in Vancouver. Design your own bouquet at home with curated stems and simple, beautiful presentation.">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#f7f3ee">

<link rel="canonical" href="https://botanicalreserve.ca">

<meta property="og:title" content="The Botanical Reserve">
<meta property="og:description" content="Flower Kits, Delivered Weekly. Designed by You.">
<meta property="og:image" content="https://botanicalreserve.ca/frontpage.png">

<meta name="twitter:card" content="summary_large_image">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  font-family: 'Playfair Display', serif;
  background: #f7f3ee;
  overflow-x: hidden;
}

/* background */
.bg {
  position: fixed;
  inset: 0;
  background-image: url("frontpage.png");
  background-size: cover;
  background-position: center;
  filter: blur(18px);
  transform: scale(1.1);
  z-index: 0;
}

/* top banner */
.top-banner {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  padding: 10px 20px;
  border-radius: 999px;
  background: rgba(255,255,255,0.16);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  color: #3f3a3a;
  font-size: 15px;
  white-space: nowrap;
}

/* hero text */
.hero-text {
  position: absolute;
  top: 28%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 3;
  text-align: center;
  color: #3f3a3a;
  max-width: 800px;
  width: 90%;
}

.hero-text .brand {
  font-size: 42px;
  letter-spacing: 0.08em;
  font-weight: 500;
  margin-bottom: 18px;
  line-height: 1.1;
}

.hero-text .sub {
  font-size: 20px;
  margin-bottom: 10px;
  line-height: 1.3;
}

.hero-text .tag {
  font-size: 18px;
  font-style: italic;
  opacity: 0.85;
  line-height: 1.3;
}

.hero-text .brand,
.hero-text .sub,
.hero-text .tag {
  text-shadow: 0 2px 10px rgba(255,255,255,0.35);
}

/* image */
.desktop-img {
  position: relative;
  z-index: 2;
  max-width: 100%;
  max-height: 100vh;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  display: block;
}

/* desktop form */
.form-wrap {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 4;
}

.email-form {
  display: flex;
  gap: 10px;
  padding: 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.14);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

.email-form input,
.email-form select,
.email-form button {
  height: 44px;
  border-radius: 999px;
  border: none;
  font-family: 'Playfair Display', serif;
  padding: 0 14px;
  font-size: 15px;
}

.email-form input,
.email-form select {
  background: white;
  min-width: 210px;
  color: #000;
}

.email-form button {
  background: white;
  cursor: pointer;
  white-space: nowrap;
  min-width: 190px;
  padding: 0 20px;
  color: #000;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* hide mobile-only elements on desktop */
.quick-email,
.full-form-section {
  display: none;
}

/* MOBILE ONLY */
@media (max-width: 768px) {
  html, body {
    height: 100%;
  }

  body {
    display: block;
    position: relative;
    overflow-x: hidden;
    overflow-y: hidden;
    background: #f7f3ee;
  }

  .bg {
    display: none;
  }

  .top-banner {
    top: calc(env(safe-area-inset-top, 0px) + 14px);
    font-size: 14px;
    padding: 11px 22px;
  }

  .hero-text {
    top: 18%;
    left: 50%;
    transform: translate(-50%, 0);
    width: 88%;
    z-index: 3;
  }

  .hero-text .brand {
    font-size: 29px;
    margin-bottom: 12px;
    line-height: 1.04;
    letter-spacing: 0.04em;
  }

  .hero-text .sub {
    font-size: 15px;
    margin-bottom: 7px;
    line-height: 1.2;
  }

  .hero-text .tag {
    font-size: 13px;
    line-height: 1.2;
  }

  .desktop-img {
    width: 100%;
    height: 100svh;
    height: 100dvh;
    max-width: none;
    max-height: none;
    object-fit: cover;
    object-position: center 44%;
    box-shadow: none;
  }

  .form-wrap {
    display: none;
  }

  .quick-email {
    display: none;
  }

  .full-form-section {
    display: block;
    position: absolute;
    left: 50%;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 8px);
    transform: translateX(-50%) scale(0.90);
    transform-origin: bottom center;
    width: 82%;
    max-width: 320px;
    padding: 0;
    background: transparent;
    z-index: 4;
  }

  .full-form-section .email-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    background: rgba(255,255,255,0.14);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 8px;
    border-radius: 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  }

  .full-form-section input,
  .full-form-section select,
  .full-form-section button {
    width: 100%;
    height: 42px;
    border-radius: 999px;
    border: none;
    padding: 0 14px;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
  }

  .full-form-section input,
  .full-form-section select {
    background: rgba(255,255,255,0.96);
    color: #000;
  }

  .full-form-section button {
    background: white;
    color: #000;
    cursor: pointer;
  }
}
</style>
</head>

<body>

<div class="bg"></div>

  Launching in Vancouver
</div>

      <option>Arbutus Ridge</option>

</body>
</html>
